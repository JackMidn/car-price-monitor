services:
  car-price-monitor:
    build: .
    container_name: car-price-monitor
    ports:
      - "8088:8000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=${DB_PASS:-your_password}
      - DB_NAME=car_price
    networks:
      - mysql-net
    restart: unless-stopped

networks:
  mysql-net:
    external: true
    name: ai-chat-engine_default
